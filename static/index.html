<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 调测入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cyber-green: #00ff9f;
            --cyber-blue: #00d4ff;
            --cyber-purple: #b24bf3;
            --cyber-red: #ff2a6d;
            --cyber-yellow: #ffd319;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(0, 255, 159, 0.03);
            --border-glow: rgba(0, 255, 159, 0.3);
            --text-primary: #e0e0e0;
            --text-secondary: #6b7280;
        }

        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: var(--bg-dark);
            min-height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
        }

        /* 矩阵雨背景 */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
        }

        /* 扫描线效果 */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 159, 0.02) 2px,
                rgba(0, 255, 159, 0.02) 4px
            );
        }

        /* 网格背景 */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image:
                linear-gradient(rgba(0, 255, 159, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 159, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* 角落装饰 */
        .corner-decor {
            position: fixed;
            width: 100px;
            height: 100px;
            z-index: 2;
            pointer-events: none;
        }

        .corner-decor::before,
        .corner-decor::after {
            content: '';
            position: absolute;
            background: var(--cyber-green);
        }

        .corner-tl { top: 20px; left: 20px; }
        .corner-tl::before { width: 60px; height: 2px; top: 0; left: 0; }
        .corner-tl::after { width: 2px; height: 60px; top: 0; left: 0; }

        .corner-tr { top: 20px; right: 20px; }
        .corner-tr::before { width: 60px; height: 2px; top: 0; right: 0; }
        .corner-tr::after { width: 2px; height: 60px; top: 0; right: 0; }

        .corner-bl { bottom: 20px; left: 20px; }
        .corner-bl::before { width: 60px; height: 2px; bottom: 0; left: 0; }
        .corner-bl::after { width: 2px; height: 60px; bottom: 0; left: 0; }

        .corner-br { bottom: 20px; right: 20px; }
        .corner-br::before { width: 60px; height: 2px; bottom: 0; right: 0; }
        .corner-br::after { width: 2px; height: 60px; bottom: 0; right: 0; }

        /* 主容器 */
        .chat-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
        }

        /* 头部 */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 0;
            margin-bottom: 20px;
            position: relative;
        }

        .chat-header::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyber-green), transparent);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: transparent;
            border: 2px solid var(--cyber-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            position: relative;
            animation: logoPulse 2s ease-in-out infinite;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 1px solid var(--cyber-green);
            opacity: 0.3;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 10px var(--cyber-green), inset 0 0 10px rgba(0, 255, 159, 0.1); }
            50% { box-shadow: 0 0 20px var(--cyber-green), inset 0 0 20px rgba(0, 255, 159, 0.2); }
        }

        .header-title h1 {
            font-size: 1.2rem;
            color: var(--cyber-green);
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .header-title p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border-glow);
            color: var(--cyber-green);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
            font-family: inherit;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-btn:hover {
            background: rgba(0, 255, 159, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 159, 0.3);
        }

        /* 消息区域 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            margin-bottom: 20px;
            position: relative;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--cyber-green);
        }

        .message {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            animation: messageGlitch 0.3s ease-out;
        }

        @keyframes messageGlitch {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border: 1px solid var(--cyber-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            color: var(--cyber-green);
        }

        .message.user .message-avatar {
            border-color: var(--cyber-blue);
            color: var(--cyber-blue);
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            line-height: 1.7;
            font-size: 0.9rem;
        }

        .message.assistant .message-content {
            background: rgba(0, 255, 159, 0.05);
            border-left: 2px solid var(--cyber-green);
        }

        .message.user .message-content {
            background: rgba(0, 212, 255, 0.05);
            border-right: 2px solid var(--cyber-blue);
            text-align: right;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .intent-tag {
            padding: 2px 8px;
            background: transparent;
            border: 1px solid var(--cyber-purple);
            color: var(--cyber-purple);
            font-size: 0.65rem;
            letter-spacing: 1px;
        }

        /* 打字指示器 */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--cyber-green);
            animation: typing 1.4s ease-in-out infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-5px); }
        }

        /* 输入区域 */
        .input-container {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper::before {
            content: '>';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cyber-green);
            font-size: 1rem;
        }

        .input-wrapper textarea {
            width: 100%;
            padding: 15px 20px 15px 35px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            min-height: 50px;
            max-height: 150px;
            font-family: inherit;
        }

        .input-wrapper textarea:focus {
            border-color: var(--cyber-green);
            box-shadow: 0 0 10px rgba(0, 255, 159, 0.2);
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            background: transparent;
            border: 1px solid var(--cyber-green);
            color: var(--cyber-green);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 18px;
            font-family: inherit;
        }

        .send-btn:hover:not(:disabled) {
            background: rgba(0, 255, 159, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 159, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .send-btn.loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: var(--cyber-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 欢迎消息 */
        .welcome-message {
            text-align: center;
            padding: 60px 20px;
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
            96% { transform: translate(-2px, -2px); }
            98% { transform: translate(2px, 2px); }
        }

        .welcome-message h2 {
            color: var(--cyber-green);
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .welcome-message p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 40px;
        }

        .quick-action {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
            font-family: inherit;
            letter-spacing: 1px;
        }

        .quick-action:hover {
            background: rgba(0, 255, 159, 0.1);
            border-color: var(--cyber-green);
            color: var(--cyber-green);
            box-shadow: 0 0 15px rgba(0, 255, 159, 0.3);
        }

        /* 连接状态 */
        .connection-status {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 8px 16px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--cyber-green);
            animation: blink 2s ease-in-out infinite;
        }

        .status-dot.connecting { background: var(--cyber-yellow); }
        .status-dot.disconnected { background: var(--cyber-red); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 流式光标 */
        .streaming-cursor::after {
            content: '_';
            color: var(--cyber-green);
            animation: blinkCursor 0.6s ease-in-out infinite;
        }

        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 状态栏 */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 25px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid var(--border-glow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            font-size: 0.65rem;
            color: var(--text-secondary);
            z-index: 100;
            letter-spacing: 1px;
        }

        .status-bar-left, .status-bar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-item span {
            color: var(--cyber-green);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .chat-container {
                padding: 15px;
            }

            .chat-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .message-content {
                max-width: 85%;
            }

            .quick-actions {
                flex-direction: column;
            }

            .corner-decor {
                display: none;
            }

            .status-bar {
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 矩阵雨背景 -->
    <canvas class="matrix-bg" id="matrixCanvas"></canvas>

    <!-- 网格背景 -->
    <div class="grid-overlay"></div>

    <!-- 扫描线 -->
    <div class="scanlines"></div>

    <!-- 角落装饰 -->
    <div class="corner-decor corner-tl"></div>
    <div class="corner-decor corner-tr"></div>
    <div class="corner-decor corner-bl"></div>
    <div class="corner-decor corner-br"></div>

    <!-- 连接状态 -->
    <div class="connection-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">SYSTEM ONLINE</span>
    </div>

    <!-- 主容器 -->
    <div class="chat-container">
        <!-- 头部 -->
        <div class="chat-header">
            <div class="header-left">
                <div class="logo">AI</div>
                <div class="header-title">
                    <h1>AI Agent 调测入口</h1>
                    <p>SKILL SYSTEM v1.0 // DEEPSEEK-V3.2</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="refreshBtn" onclick="refreshConfig()">[REFRESH]</button>
                <button class="header-btn" onclick="newSession()">[NEW]</button>
                <button class="header-btn" onclick="clearHistory()">[CLEAR]</button>
            </div>
        </div>

        <!-- 消息区域 -->
        <div class="messages-container" id="messagesContainer">
            <div class="welcome-message">
                <div class="welcome-icon">[ ]</div>
                <h2>System Ready</h2>
                <p>AI Agent 调测系统已就绪 // 输入指令开始交互</p>
                <div class="quick-actions" id="quickActions">
                    <!-- 快捷操作按钮将通过 API 动态加载 -->
                    <span style="color: var(--text-secondary); font-size: 0.8rem;">LOADING...</span>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    placeholder="输入指令..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                    oninput="autoResize(this)"
                ></textarea>
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                &gt;
            </button>
        </div>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-bar-left">
            <div class="status-item">SESSION: <span id="sessionDisplay">--</span></div>
            <div class="status-item">MODE: <span>SKILL</span></div>
        </div>
        <div class="status-bar-right">
            <div class="status-item">MODEL: <span>DEEPSEEK-V3.2</span></div>
            <div class="status-item">STATUS: <span id="systemStatus">READY</span></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let sessionId = 'session_' + Date.now();
        let isStreaming = false;

        // 矩阵雨效果
        function initMatrix() {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = [];

            for (let i = 0; i < columns; i++) {
                drops[i] = 1;
            }

            function draw() {
                ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00ff9f';
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }

            setInterval(draw, 50);
        }

        // 更新会话显示
        function updateSessionDisplay() {
            document.getElementById('sessionDisplay').textContent = sessionId.substring(0, 12) + '...';
        }

        // 自动调整输入框高度
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        // 处理键盘事件
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 更新连接状态
        function updateStatus(status, text) {
            const dot = document.getElementById('statusDot');
            const textEl = document.getElementById('statusText');
            const sysStatus = document.getElementById('systemStatus');
            dot.className = 'status-dot ' + status;
            textEl.textContent = text;
            sysStatus.textContent = status === 'connected' ? 'READY' : status === 'connecting' ? 'PROCESSING' : 'ERROR';
        }

        // 添加消息
        function addMessage(content, isUser, intentName = null) {
            const container = document.getElementById('messagesContainer');

            // 移除欢迎消息
            const welcome = container.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = isUser ? 'USR' : 'SYS';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (isUser) {
                contentDiv.textContent = content;
            } else {
                contentDiv.innerHTML = formatContent(content);

                if (intentName) {
                    const meta = document.createElement('div');
                    meta.className = 'message-meta';
                    meta.innerHTML = `<span class="intent-tag">${intentName}</span>`;
                    contentDiv.appendChild(meta);
                }
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            container.appendChild(messageDiv);

            scrollToBottom();
            return contentDiv;
        }

        // 添加打字指示器
        function addTypingIndicator() {
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = 'SYS';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            container.appendChild(messageDiv);

            scrollToBottom();
        }

        // 移除打字指示器
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // 格式化内容
        function formatContent(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>');
        }

        // 滚动到底部
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        // 发送快捷消息
        function sendQuickMessage(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        // 发送消息（流式）
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();

            if (!message || isStreaming) return;

            // 添加用户消息
            addMessage(message, true);
            input.value = '';
            autoResize(input);

            // 开始流式请求
            isStreaming = true;
            sendBtn.disabled = true;
            sendBtn.classList.add('loading');
            sendBtn.innerHTML = '';
            updateStatus('connecting', 'PROCESSING...');

            addTypingIndicator();

            try {
                const response = await fetch(`${API_BASE}/api/chat/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                if (!response.ok) {
                    throw new Error('REQUEST FAILED');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let currentContent = '';
                let currentIntent = null;
                let contentDiv = null;

                removeTypingIndicator();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));

                                if (data.type === 'intent') {
                                    currentIntent = data.intent_name;
                                } else if (data.type === 'content') {
                                    currentContent += data.content;

                                    if (!contentDiv) {
                                        contentDiv = addMessage(currentContent, false, currentIntent);
                                        contentDiv.classList.add('streaming-cursor');
                                    } else {
                                        const textPart = contentDiv.childNodes[0];
                                        if (textPart && textPart.nodeType === Node.TEXT_NODE) {
                                            textPart.textContent = '';
                                        }
                                        const meta = contentDiv.querySelector('.message-meta');
                                        contentDiv.innerHTML = formatContent(currentContent);
                                        if (meta) contentDiv.appendChild(meta);
                                        contentDiv.classList.add('streaming-cursor');
                                        scrollToBottom();
                                    }
                                } else if (data.type === 'done') {
                                    if (contentDiv) {
                                        contentDiv.classList.remove('streaming-cursor');
                                    }
                                } else if (data.type === 'error') {
                                    addMessage('[ERROR] ' + data.content, false);
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }

                updateStatus('connected', 'SYSTEM ONLINE');

            } catch (error) {
                removeTypingIndicator();
                addMessage('[ERROR] Network failure - retry required', false);
                updateStatus('disconnected', 'CONNECTION LOST');
                console.error('Error:', error);
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
                sendBtn.classList.remove('loading');
                sendBtn.innerHTML = '&gt;';
            }
        }

        // 新建会话
        async function newSession() {
            try {
                const response = await fetch(`${API_BASE}/api/session/new`, {
                    method: 'POST'
                });
                const data = await response.json();
                sessionId = data.session_id;
                updateSessionDisplay();

                // 获取动态快捷操作
                const quickActionsHTML = await getQuickActionsHTML();

                // 清空界面
                const container = document.getElementById('messagesContainer');
                container.innerHTML = `
                    <div class="welcome-message">
                        <div class="welcome-icon">[ ]</div>
                        <h2>System Ready</h2>
                        <p>AI Agent 调测系统已就绪 // 输入指令开始交互</p>
                        <div class="quick-actions">
                            ${quickActionsHTML}
                        </div>
                    </div>
                `;

                updateStatus('connected', 'SYSTEM ONLINE');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // 清空历史
        async function clearHistory() {
            try {
                await fetch(`${API_BASE}/api/history/${sessionId}`, {
                    method: 'DELETE'
                });
                await newSession();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // 刷新配置
        async function refreshConfig() {
            const btn = document.getElementById('refreshBtn');
            const originalText = btn.textContent;

            try {
                // 显示加载状态
                btn.textContent = '[LOADING...]';
                btn.disabled = true;

                // 调用刷新接口
                const response = await fetch(`${API_BASE}/api/config/refresh`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.status === 'ok' && data.reloaded) {
                    // 重新渲染欢迎区域（包含 quickActions 容器）
                    const container = document.getElementById('messagesContainer');
                    container.innerHTML = `
                        <div class="welcome-message">
                            <div class="welcome-icon">[ ]</div>
                            <h2>System Ready</h2>
                            <p>配置已刷新 // 加载了 ${data.loaded_count} 个技能</p>
                            <div class="quick-actions" id="quickActions">
                                <span style="color: var(--text-secondary); font-size: 0.8rem;">LOADING...</span>
                            </div>
                        </div>
                    `;

                    // 刷新快捷操作
                    await loadQuickActions();

                    // 更新状态显示
                    updateStatus('connected', 'CONFIG RELOADED');

                    // 2秒后恢复状态
                    setTimeout(() => {
                        updateStatus('connected', 'SYSTEM ONLINE');
                    }, 2000);

                    console.log(`配置刷新成功: ${data.message}`);
                } else {
                    console.error('配置刷新失败:', data.message);
                    updateStatus('disconnected', 'REFRESH FAILED');
                }
            } catch (error) {
                console.error('刷新配置失败:', error);
                updateStatus('disconnected', 'REFRESH ERROR');
            } finally {
                // 恢复按钮状态
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initMatrix();
            updateSessionDisplay();
            loadQuickActions();  // 动态加载快捷操作
            document.getElementById('messageInput').focus();
        });

        // 从 API 加载快捷操作
        async function loadQuickActions() {
            try {
                const response = await fetch(`${API_BASE}/api/skills`);
                const data = await response.json();

                const container = document.getElementById('quickActions');
                container.innerHTML = '';

                let hasActions = false;

                // 遍历所有技能的快捷操作
                for (const skill of data.skills) {
                    if (skill.quick_actions && skill.quick_actions.length > 0) {
                        hasActions = true;
                        for (const action of skill.quick_actions) {
                            const btn = document.createElement('button');
                            btn.className = 'quick-action';
                            btn.textContent = action.label;
                            btn.onclick = () => sendQuickMessage(action.message);
                            container.appendChild(btn);
                        }
                    }
                }

                // 如果没有快捷操作，显示默认提示
                if (!hasActions) {
                    container.innerHTML = '<span style="color: var(--text-secondary); font-size: 0.8rem;">NO QUICK ACTIONS</span>';
                }
            } catch (error) {
                console.error('加载快捷操作失败:', error);
                const container = document.getElementById('quickActions');
                container.innerHTML = '<span style="color: var(--cyber-red); font-size: 0.8rem;">[ERROR] LOAD FAILED</span>';
            }
        }

        // 获取所有快捷操作（用于 newSession 时重新渲染）
        function getQuickActionsHTML() {
            return new Promise((resolve) => {
                fetch(`${API_BASE}/api/skills`)
                    .then(res => res.json())
                    .then(data => {
                        let html = '';
                        for (const skill of data.skills) {
                            if (skill.quick_actions && skill.quick_actions.length > 0) {
                                for (const action of skill.quick_actions) {
                                    html += `<button class="quick-action" onclick="sendQuickMessage('${action.message}')">${action.label}</button>`;
                                }
                            }
                        }
                        resolve(html || '<span style="color: var(--text-secondary); font-size: 0.8rem;">NO QUICK ACTIONS</span>');
                    })
                    .catch(() => {
                        resolve('<span style="color: var(--cyber-red); font-size: 0.8rem;">[ERROR] LOAD FAILED</span>');
                    });
            });
        }
    </script>
</body>
</html>
