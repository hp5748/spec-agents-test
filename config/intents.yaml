# 意图类型配置
# examples: 示例用户输入，用于引导 LLM 正确识别意图
intents:
  order_query:
    name: 订单查询
    description: 查询订单状态、物流信息、发货/送达情况
    examples:
      - "查询订单 12345678"
      - "我的订单到哪了"
      - "订单发货了吗"
      - "物流信息查询"
      - "帮我看看订单状态"

  logistics_query:
    name: 物流查询
    description: 查询物流跟踪、快递进度、配送状态
    examples:
      - "快递到哪了"
      - "物流进度查询"
      - "我的包裹到哪了"
      - "配送状态"

  product_consult:
    name: 商品咨询
    description: 商品推荐、价格查询、产品对比、库存咨询
    examples:
      - "有什么手机推荐"
      - "iPhone 多少钱"
      - "这款产品有货吗"
      - "帮我推荐一款笔记本"
      - "这两款手机哪个好"

  complaint:
    name: 投诉处理
    description: 投诉、反馈问题、创建工单、服务不满
    examples:
      - "我要投诉"
      - "商品质量有问题"
      - "服务态度太差了"
      - "我要反馈一个问题"
      - "申请售后"

  general_qa:
    name: 通用问答
    description: 常见问题、服务说明、其他不属于以上几类的咨询
    examples:
      - "你们营业时间是什么"
      - "怎么联系客服"
      - "支持什么支付方式"
      - "你好"
      - "谢谢"
